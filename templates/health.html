<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ʜᴇᴀʟᴛʜ | {{ bot_name }}</title>
  <link rel="icon" href="https://i.ibb.co/KzqHfL05/photo-2026-02-07-13-38-13.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { min-height: 100%; background-color: #764ba2; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%) fixed;
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .bg-animation {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; overflow: hidden;
    }
    .bg-animation span {
      position: absolute; display: block;
      background: rgba(255,255,255,0.1);
      animation: animate 25s linear infinite;
      bottom: -150px;
    }
    .bg-animation span:nth-child(1)  { left:25%; width:80px;  height:80px;  animation-delay:0s; }
    .bg-animation span:nth-child(2)  { left:10%; width:20px;  height:20px;  animation-delay:2s;  animation-duration:12s; }
    .bg-animation span:nth-child(3)  { left:70%; width:20px;  height:20px;  animation-delay:4s; }
    .bg-animation span:nth-child(4)  { left:40%; width:60px;  height:60px;  animation-delay:0s;  animation-duration:18s; }
    .bg-animation span:nth-child(5)  { left:65%; width:20px;  height:20px;  animation-delay:0s; }
    .bg-animation span:nth-child(6)  { left:75%; width:110px; height:110px; animation-delay:3s; }
    .bg-animation span:nth-child(7)  { left:35%; width:150px; height:150px; animation-delay:7s; }
    .bg-animation span:nth-child(8)  { left:50%; width:25px;  height:25px;  animation-delay:15s; animation-duration:45s; }
    .bg-animation span:nth-child(9)  { left:20%; width:15px;  height:15px;  animation-delay:2s;  animation-duration:35s; }
    .bg-animation span:nth-child(10) { left:85%; width:150px; height:150px; animation-delay:0s;  animation-duration:11s; }
    @keyframes animate {
      0%   { transform: translateY(0) rotate(0deg);    opacity:1; border-radius:0;   }
      100% { transform: translateY(-1000px) rotate(720deg); opacity:0; border-radius:50%; }
    }

    .container {
      position: relative; z-index: 1;
      max-width: 640px; width: 90%;
      padding: 20px;
      animation: fadeInDown 0.8s ease;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 30px;
      padding: 50px 45px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 6px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
    }

    .pulse-dot {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
      animation: pulse-ring 2s ease-in-out infinite;
    }
    .pulse-dot i { color: white; font-size: 1.6rem; }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      color: #333;
      margin-bottom: 6px;
    }
    .subtitle { color: #888; font-size: .95rem; margin-bottom: 36px; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(102,126,234,0.1);
    }
    .info-row:last-of-type { border-bottom: none; }
    .info-label {
      display: flex; align-items: center; gap: 10px;
      color: #555; font-size: .92rem; font-weight: 500;
    }
    .info-label i {
      width: 22px; text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .info-value { font-weight: 700; color: #333; font-size: .95rem; }
    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
    }
    .badge-ok   { background: rgba(34,197,94,0.12);  color: #16a34a; }
    .badge-init { background: rgba(234,179,8,0.12);   color: #ca8a04; }

    .btn-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 14px; margin-top: 36px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 13px 28px; border-radius: 50px;
      font-weight: 700; font-size: .9rem;
      text-decoration: none; transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(102,126,234,0.5); }
    .btn-tg {
      background: linear-gradient(135deg, #26a4da, #1e89b8);
      color: white;
      box-shadow: 0 8px 24px rgba(38,164,218,0.35);
    }
    .btn-tg:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(38,164,218,0.45); }

    .footer-note {
      margin-top: 28px;
      color: rgba(255,255,255,0.85);
      font-size: .9rem;
      text-align: center;
    }
    .footer-note a { color: #ffd700; text-decoration: none; font-weight: 700; }
    .footer-note a:hover { color: #ffed4e; }

    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-40px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @media (max-width: 600px) {
      .card { padding: 36px 20px; }
      .btn-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="card">
      <div class="pulse-dot"><i class="fa-solid fa-heart-pulse"></i></div>
      <h1>ꜱʏꜱᴛᴇᴍ ʜᴇᴀʟᴛʜ</h1>
      <p class="subtitle">ʀᴇᴀʟ-ᴛɪᴍᴇ ꜱᴛᴀᴛᴜꜱ ᴄʜᴇᴄᴋ</p>

      <div class="info-row">
        <span class="info-label"><i class="fa-solid fa-circle-check"></i> ꜱᴛᴀᴛᴜꜱ</span>
        <span class="badge badge-ok">ᴏɴʟɪɴᴇ</span>
      </div>
      <div class="info-row">
        <span class="info-label"><i class="fa-brands fa-telegram"></i> ʙᴏᴛ</span>
        <span class="badge {{ 'badge-ok' if bot_status == 'running' else 'badge-init' }}">
          {{ 'ʀᴜɴɴɪɴɢ' if bot_status == 'running' else 'ɪɴɪᴛɪᴀʟɪᴢɪɴɢ' }}
        </span>
      </div>
      <div class="info-row">
        <span class="info-label"><i class="fa-solid fa-at"></i> ᴜꜱᴇʀɴᴀᴍᴇ</span>
        <span class="info-value">@{{ bot_username }}</span>
      </div>
      <div class="info-row">
        <span class="info-label"><i class="fa-solid fa-server"></i> ꜱᴇʀᴠᴇʀ</span>
        <span class="badge badge-ok">ᴏɴʟɪɴᴇ</span>
      </div>

      <div class="btn-row">
        <a href="/" class="btn btn-primary"><i class="fa-solid fa-house"></i> ʜᴏᴍᴇ</a>
        <a href="https://t.me/{{ bot_username }}" target="_blank" class="btn btn-tg">
          <i class="fa-brands fa-telegram"></i> ᴏᴘᴇɴ ʙᴏᴛ
        </a>
      </div>
    </div>

    <div class="footer-note">
      ᴘᴏᴡᴇʀᴇᴅ ʙʏ <a href="https://t.me/{{ bot_username }}">{{ bot_name }}</a> &nbsp;·&nbsp;
      ᴄʀᴇᴀᴛᴇᴅ ᴡɪᴛʜ ❤️ ʙʏ <a href="https://t.me/FLiX_LY" target="_blank">@FLiX_LY</a>
    </div>
  </div>
</body>
</html>
