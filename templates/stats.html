<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ꜱᴛᴀᴛꜱ | {{ bot_name }}</title>
  <link rel="icon" href="https://i.ibb.co/KzqHfL05/photo-2026-02-07-13-38-13.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { min-height: 100%; background-color: #764ba2; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%) fixed;
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .bg-animation {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; overflow: hidden;
    }
    .bg-animation span {
      position: absolute; display: block;
      background: rgba(255,255,255,0.1);
      animation: animate 25s linear infinite;
      bottom: -150px;
    }
    .bg-animation span:nth-child(1)  { left:25%; width:80px;  height:80px;  animation-delay:0s; }
    .bg-animation span:nth-child(2)  { left:10%; width:20px;  height:20px;  animation-delay:2s;  animation-duration:12s; }
    .bg-animation span:nth-child(3)  { left:70%; width:20px;  height:20px;  animation-delay:4s; }
    .bg-animation span:nth-child(4)  { left:40%; width:60px;  height:60px;  animation-delay:0s;  animation-duration:18s; }
    .bg-animation span:nth-child(5)  { left:65%; width:20px;  height:20px;  animation-delay:0s; }
    .bg-animation span:nth-child(6)  { left:75%; width:110px; height:110px; animation-delay:3s; }
    .bg-animation span:nth-child(7)  { left:35%; width:150px; height:150px; animation-delay:7s; }
    .bg-animation span:nth-child(8)  { left:50%; width:25px;  height:25px;  animation-delay:15s; animation-duration:45s; }
    .bg-animation span:nth-child(9)  { left:20%; width:15px;  height:15px;  animation-delay:2s;  animation-duration:35s; }
    .bg-animation span:nth-child(10) { left:85%; width:150px; height:150px; animation-delay:0s;  animation-duration:11s; }
    @keyframes animate {
      0%   { transform: translateY(0) rotate(0deg);    opacity:1; border-radius:0;   }
      100% { transform: translateY(-1000px) rotate(720deg); opacity:0; border-radius:50%; }
    }

    .container {
      position: relative; z-index: 1;
      max-width: 760px; width: 90%;
      padding: 20px;
      animation: fadeInDown 0.8s ease;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 30px;
      padding: 50px 45px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 6px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
    }

    .page-icon {
      font-size: 3.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      color: #333;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #888;
      font-size: .95rem;
      margin-bottom: 36px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08));
      border: 1px solid rgba(102,126,234,0.18);
      border-radius: 18px;
      padding: 22px 18px;
      text-align: center;
    }
    .stat-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-value {
      font-size: 1.7rem;
      font-weight: 800;
      color: #333;
      line-height: 1;
    }
    .stat-label {
      font-size: .78rem;
      color: #888;
      margin-top: 5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .bw-section { margin-bottom: 32px; }
    .bw-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .bw-title { font-weight: 700; color: #444; font-size: .95rem; }
    .bw-pct   { font-weight: 700; color: #764ba2; font-size: .95rem; }
    .bw-bar-bg {
      height: 10px;
      background: rgba(102,126,234,0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .bw-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 999px;
      transition: width 1s ease;
    }
    .bw-meta {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      color: #888;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: .9rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(102,126,234,0.5); }
    .btn-tg {
      background: linear-gradient(135deg, #26a4da, #1e89b8);
      color: white;
      box-shadow: 0 8px 24px rgba(38,164,218,0.35);
    }
    .btn-tg:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(38,164,218,0.45); }

    .footer-note {
      margin-top: 28px;
      color: rgba(255,255,255,0.85);
      font-size: .9rem;
      text-align: center;
    }
    .footer-note a { color: #ffd700; text-decoration: none; font-weight: 700; }
    .footer-note a:hover { color: #ffed4e; }

    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-40px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @media (max-width: 600px) {
      .card { padding: 36px 20px; }
      .btn-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="card">
      <div class="page-icon"><i class="fa-solid fa-chart-pie"></i></div>
      <h1>ʙᴏᴛ ꜱᴛᴀᴛɪꜱᴛɪᴄꜱ</h1>
      <p class="subtitle">ʟɪᴠᴇ ꜱᴛᴀᴛꜱ ꜰᴏʀ {{ bot_name }}</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
          <div class="stat-value">{{ total_users }}</div>
          <div class="stat-label">ᴛᴏᴛᴀʟ ᴜꜱᴇʀꜱ</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-folder-open"></i></div>
          <div class="stat-value">{{ total_files }}</div>
          <div class="stat-label">ᴛᴏᴛᴀʟ ꜰɪʟᴇꜱ</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-upload"></i></div>
          <div class="stat-value">{{ bw_used }}</div>
          <div class="stat-label">ʙᴡ ᴜꜱᴇᴅ</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-calendar-day"></i></div>
          <div class="stat-value">{{ bw_today }}</div>
          <div class="stat-label">ʙᴡ ᴛᴏᴅᴀʏ</div>
        </div>
      </div>

      <div class="bw-section">
        <div class="bw-header">
          <span class="bw-title">ʙᴀɴᴅᴡɪᴅᴛʜ ᴜꜱᴀɢᴇ</span>
          <span class="bw-pct">{{ bw_pct }}%</span>
        </div>
        <div class="bw-bar-bg">
          <div class="bw-bar-fill" style="width: {{ bw_pct }}%;"></div>
        </div>
        <div class="bw-meta">
          <span>{{ bw_used }} ᴜꜱᴇᴅ</span>
          <span>{{ bw_limit }} ʟɪᴍɪᴛ</span>
        </div>
      </div>

      <div class="btn-row">
        <a href="/" class="btn btn-primary"><i class="fa-solid fa-house"></i> ʜᴏᴍᴇ</a>
        <a href="https://t.me/{{ bot_username }}" target="_blank" class="btn btn-tg">
          <i class="fa-brands fa-telegram"></i> ᴏᴘᴇɴ ʙᴏᴛ
        </a>
      </div>
    </div>

    <div class="footer-note">
      ᴘᴏᴡᴇʀᴇᴅ ʙʏ <a href="https://t.me/{{ bot_username }}">{{ bot_name }}</a> &nbsp;·&nbsp;
      ᴄʀᴇᴀᴛᴇᴅ ᴡɪᴛʜ ❤️ ʙʏ <a href="https://t.me/FLiX_LY" target="_blank">@FLiX_LY</a>
    </div>
  </div>
</body>
</html>
